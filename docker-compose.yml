services:
  api:
    build: .
    container_name: fastapi-task-manager
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    container_name: fastapi-task-manager-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_task_manager_db
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fastapi-task-manager-redis
    expose:
      - "6379"
    
  migrate:
    build: .
    env_file: [.env]
    depends_on: [db]
    command: ["uv", "run", "alembic", "upgrade", "head"]
    profiles: ["migrations"]


volumes:
  pgdata:
